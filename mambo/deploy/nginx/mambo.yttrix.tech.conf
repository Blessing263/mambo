# /etc/nginx/sites-available/mambo.yttrix.tech
server {
    listen 443 ssl http2;
    server_name mambo.yttrix.tech ruzivo.yttrix.tech;

    ssl_certificate     /etc/letsencrypt/live/mambo.yttrix.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mambo.yttrix.tech/privkey.pem;

    client_max_body_size 1m;
    proxy_read_timeout 120s;
    proxy_buffering off;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # API — pass real IP for rate limiting
    location /api/ {
        proxy_pass http://127.0.0.1:8770/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Webchat — Next.js standalone output
    location / {
        proxy_pass http://127.0.0.1:3055;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Static assets — Next.js serves these
    location /_next/ {
        proxy_pass http://127.0.0.1:3055;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1d;
    }

    # Favicon
    location = /favicon.svg {
        proxy_pass http://127.0.0.1:3055;
        proxy_http_version 1.1;
        expires 7d;
    }
}

server {
    listen 80;
    server_name mambo.yttrix.tech ruzivo.yttrix.tech;
    return 301 https://$host$request_uri;
}
