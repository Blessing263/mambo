# /etc/nginx/sites-available/mambo.yttrix.tech
server {
    listen 80;
    listen [::]:80;
    server_name mambo.yttrix.tech;

    location ^~ /.well-known/acme-challenge/ {
        auth_basic off;
        root /var/www/html;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 127.0.0.1:8443 ssl http2;
    server_name mambo.yttrix.tech;

    ssl_certificate     /etc/letsencrypt/live/mambo.yttrix.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mambo.yttrix.tech/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/mambo.yttrix.tech-access.log;
    error_log  /var/log/nginx/mambo.yttrix.tech-error.log;

    # API — pass real IP for rate limiting
    location /api/ {
        proxy_pass http://127.0.0.1:8771/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no;
    }

    # Webchat — Next.js production server
    location / {
        proxy_pass http://127.0.0.1:3056;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}
