<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ruzivo — Government of Zimbabwe</title>

  <!-- Fonts: display serif + UI grotesque + documentary mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600;1,700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Phosphor Icons — premium line + fill icon set -->
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css" />

  <link rel="stylesheet" href="theme.css" />
  <style>
    /* boot splash to avoid FOUC before React mounts */
    #boot { position: fixed; inset: 0; display: grid; place-items: center; background: var(--bg); z-index: 100; transition: opacity .4s; }
    #boot.gone { opacity: 0; pointer-events: none; }
    .boot-dot { width: 9px; height: 9px; border-radius: 99px; background: var(--accent); animation: pulseDot 1.3s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="boot">
    <div style="display:flex;gap:7px;align-items:center;">
      <span class="boot-dot"></span><span class="boot-dot" style="animation-delay:.16s"></span><span class="boot-dot" style="animation-delay:.32s"></span>
    </div>
  </div>
  <div id="root"></div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Demo data (plain JS) -->
  <script src="data.js"></script>

  <!-- Components (JSX) — order: primitives → blocks → screens → shell -->
  <script type="text/babel" src="emblem.jsx"></script>
  <script type="text/babel" src="answer.jsx"></script>
  <script type="text/babel" src="sidebar.jsx"></script>
  <script type="text/babel" src="chat.jsx"></script>
  <script type="text/babel" src="router.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script>
    // hide boot splash once root has content
    (function () {
      const boot = document.getElementById("boot");
      const root = document.getElementById("root");
      const obs = new MutationObserver(() => {
        if (root.children.length) { boot.classList.add("gone"); setTimeout(() => boot.remove(), 450); obs.disconnect(); }
      });
      obs.observe(root, { childList: true });
      setTimeout(() => { boot.classList.add("gone"); }, 4000);
    })();
  </script>
</body>
</html>
